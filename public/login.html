<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - PulseTech</title>
    <style>
      body {
        margin: 0;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: #f3f4f6;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: #fff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
      }
      .logo {
        text-align: center;
        font-size: 24px;
        font-weight: 800;
        color: #4f46e5;
        margin-bottom: 24px;
        letter-spacing: -0.5px;
      }
      h2 {
        text-align: center;
        font-size: 20px;
        color: #111827;
        margin: 0 0 24px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #374151;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        box-sizing: border-box;
        transition: border 0.2s;
      }
      input:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      }
      .btn {
        width: 100%;
        background: #4f46e5;
        color: #fff;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #4338ca;
      }
      .alert {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 14px;
        display: none;
      }
      .alert-error {
        background: #fef2f2;
        color: #b91c1c;
        border: 1px solid #fee2e2;
      }
      .alert-success {
        background: #f0fdf4;
        color: #15803d;
        border: 1px solid #dcfce7;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">PulseTech</div>
      <h2>Đăng nhập tài khoản</h2>

      <div id="alertBox" class="alert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="you@example.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
          />
        </div>
        <button type="submit" class="btn" id="btnLogin">Đăng nhập</button>
      </form>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const alertBox = document.getElementById("alertBox");
      const btnLogin = document.getElementById("btnLogin");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        alertBox.style.display = "none";
        btnLogin.textContent = "Đang xử lý...";
        btnLogin.disabled = true;

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
          const res = await fetch("http://localhost:5000/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.message || "Đăng nhập thất bại");
          }

          // Lưu token vào localStorage để dùng cho các request sau
          localStorage.setItem("token", data.data.token);
          localStorage.setItem("user", JSON.stringify(data.data.user));

          // Hiển thị thông báo thành công
          alertBox.className = "alert alert-success";
          alertBox.textContent = "Đăng nhập thành công! Đang chuyển hướng...";
          alertBox.style.display = "block";

          // Chuyển hướng sang trang profile test sau 1.5 giây
          setTimeout(() => {
            window.location.href = "/profile.html";
          }, 1500);
        } catch (err) {
          alertBox.className = "alert alert-error";
          alertBox.textContent = err.message;
          alertBox.style.display = "block";
          btnLogin.textContent = "Đăng nhập";
          btnLogin.disabled = false;
        }
      });
    </script>
  </body>
</html>
