<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Verification Failed</title>
    <style>
      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial;
        background: #fff7f7;
        color: #4c0519;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: white;
        padding: 36px;
        border-radius: 12px;
        box-shadow: 0 6px 24px rgba(76, 5, 25, 0.06);
        max-width: 640px;
        text-align: center;
      }
      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background: #ef4444;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 36px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0 0 16px;
        color: #7f1d1d;
      }
      a.button {
        display: inline-block;
        padding: 10px 18px;
        background: #7f1d1d;
        color: white;
        border-radius: 8px;
        text-decoration: none;
      }
      .msg {
        background: #fff1f2;
        color: #33101b;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">✕</div>
      <h1>Xác minh thất bại</h1>
      <div class="msg" id="msg">
        Một lỗi đã xảy ra trong quá trình xác minh email của bạn. Vui lòng thử
        lại hoặc liên hệ với bộ phận hỗ trợ nếu vấn đề vẫn tiếp diễn.
      </div>
      <a class="button" href="/">Return</a>
    </div>
    <script>
      const params = new URLSearchParams(location.search);
      const msg = params.get("msg");
      if (msg) {
        const el = document.getElementById("msg");
        el.textContent = decodeURIComponent(msg);
      }
    </script>
  </body>
</html>
