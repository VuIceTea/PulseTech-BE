<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xác thực thành công - PulseTech</title>
    <style>
      body {
        margin: 0;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: linear-gradient(135deg, #e0f7fa 0%, #e8f5e9 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: #fff;
        padding: 48px 40px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        max-width: 420px;
        text-align: center;
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
        border-radius: 50%;
        background: #e6f9ec;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon img {
        width: 48px;
        height: 48px;
      }
      h1 {
        font-size: 24px;
        color: #28a745;
        margin: 0 0 12px;
      }
      p {
        font-size: 15px;
        color: #4b5563;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .btn {
        display: inline-block;
        background: #28a745;
        color: #fff;
        text-decoration: none;
        padding: 12px 32px;
        border-radius: 12px;
        font-weight: 600;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #218838;
      }
      .countdown {
        font-weight: 600;
        color: #28a745;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <img src="/icons/success.svg" alt="Success" />
      </div>
      <h1>Xác minh thành công!</h1>
      <p>
        Tài khoản của bạn đã được kích hoạt. Bây giờ bạn có thể đăng nhập và
        trải nghiệm PulseTech.
      </p>
      <a href="/login.html" class="btn">Đến trang Đăng nhập</a>
      <p style="margin-top: 24px; font-size: 13px">
        Tự động chuyển hướng sau
        <span id="timer" class="countdown">5</span> giây...
      </p>
    </div>
    <script>
      let timeLeft = 5;
      const timerElement = document.getElementById("timer");
      const interval = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(interval);
          window.location.href = "/login.html";
        }
      }, 1000);
    </script>
  </body>
</html>
